name: UniversalManifestor
options:
  bundleIdPrefix: com.jeremymcvay
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"

targets:
  UniversalManifestor:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: .
        excludes:
          - "UniversalManifestor.xcodeproj/**"
          - "UniversalManifestor.app/**"
          - "release/**"
          - "build/**"
          - "project.yml"
          - ".DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jeremymcvay.UniversalManifestor
        SWIFT_VERSION: 5.9
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LH8KLB9N4F
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "Universal Manifestor"
        INFOPLIST_KEY_LSMinimumSystemVersion: "13.0"
        INFOPLIST_KEY_NSHighResolutionCapable: YES

schemes:
  UniversalManifestor:
    build:
      targets:
        UniversalManifestor: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
